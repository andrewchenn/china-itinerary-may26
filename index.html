<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>China · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --hzh:#1a5c9a;--hzh-bg:#e8f1fa;--hzh-light:#f0f6fc;
  --sha:#1a7a52;--sha-bg:#e6f4ed;--sha-light:#f0faf5;
  --njg:#8a5a00;--njg-bg:#fdf0d5;--njg-light:#fffbf0;
  --dep:#4a3580;--dep-bg:#f0edfb;--dep-light:#f8f6fe;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e5e5e5;--bg:#fafaf8;--white:#fff;
  --radius:10px;
}

/* ── BASE ─────────────────────────────────────────────────────────── */
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── MOBILE NAV (hidden on desktop) ─────────────────────────────── */
#mobile-nav{display:none;position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border)}
#mobile-header{display:flex;align-items:center;padding:12px 16px 8px;gap:10px}
#mobile-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400}
#mobile-city-pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;margin-left:auto}
.mob-pill-hzh{background:var(--hzh-bg);color:var(--hzh)}
.mob-pill-sha{background:var(--sha-bg);color:var(--sha)}
.mob-pill-njg{background:var(--njg-bg);color:var(--njg)}
.mob-pill-dep{background:var(--dep-bg);color:var(--dep)}
#mobile-day-strip{display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#mobile-day-strip::-webkit-scrollbar{display:none}
.mob-day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);min-width:52px;scroll-snap-align:start;transition:all .15s;gap:1px}
.mob-day-btn .md{font-size:13px;font-weight:500;color:var(--text)}
.mob-day-btn .mw{font-size:10px;color:var(--text3)}
.mob-day-btn.active-hzh{border-color:var(--hzh);background:var(--hzh-bg)}
.mob-day-btn.active-hzh .md{color:var(--hzh)}
.mob-day-btn.active-sha{border-color:var(--sha);background:var(--sha-bg)}
.mob-day-btn.active-sha .md{color:var(--sha)}
.mob-day-btn.active-njg{border-color:var(--njg);background:var(--njg-bg)}
.mob-day-btn.active-njg .md{color:var(--njg)}
.mob-day-btn.active-dep{border-color:var(--dep);background:var(--dep-bg)}
.mob-day-btn.active-dep .md{color:var(--dep)}
.mob-day-btn .color-bar{width:20px;height:3px;border-radius:99px;margin-top:3px}

/* ── DESKTOP LAYOUT ──────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:256px;min-width:256px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-header h1{font-family:'Playfair Display',serif;font-size:19px;font-weight:400;line-height:1.2;margin-bottom:4px}
#sidebar-header p{font-size:11px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.day-item{display:flex;align-items:stretch;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.day-item:hover{background:#f5f5f3}
.day-item.active::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.day-item.active.c-hzh::after{background:var(--hzh)}
.day-item.active.c-sha::after{background:var(--sha)}
.day-item.active.c-njg::after{background:var(--njg)}
.day-item.active.c-dep::after{background:var(--dep)}
.day-accent{width:4px;flex-shrink:0}
.c-hzh .day-accent{background:var(--hzh)}.c-sha .day-accent{background:var(--sha)}.c-njg .day-accent{background:var(--njg)}.c-dep .day-accent{background:var(--dep)}
.day-inner{padding:10px 13px;flex:1;min-width:0}
.day-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.day-num{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.day-pill{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:500;margin-left:auto;flex-shrink:0}
.c-hzh .day-pill{background:var(--hzh-bg);color:var(--hzh)}.c-sha .day-pill{background:var(--sha-bg);color:var(--sha)}.c-njg .day-pill{background:var(--njg-bg);color:var(--njg)}.c-dep .day-pill{background:var(--dep-bg);color:var(--dep)}
.day-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-sub{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#main{flex:1;display:flex;overflow:hidden;min-width:0}
#content-panel{flex:1;overflow-y:auto;padding:30px 34px;min-width:0}
#day-content{max-width:560px}
#map-panel{width:340px;min-width:340px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--white)}
#map-header{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#map-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
#map-type{font-size:10px;color:var(--text3);margin-left:auto;background:var(--bg);padding:2px 8px;border-radius:99px;border:1px solid var(--border)}
#map-container{flex:1}
#map-legend{padding:10px 13px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);line-height:1.7;max-height:160px;overflow-y:auto;flex-shrink:0}

/* ── MOBILE MAP (hidden on desktop) ─────────────────────────────── */
#mobile-map-wrap{display:none;background:var(--white);border-bottom:1px solid var(--border)}
#map-toggle-btn{width:100%;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:500;color:var(--text2);background:var(--white)}
#map-toggle-btn span{font-size:11px;color:var(--text3);font-weight:400}
#mobile-map-inner{overflow:hidden;transition:height .25s ease}
#mobile-map-container{height:230px;width:100%}
#mobile-map-legend{padding:8px 16px;font-size:11px;color:var(--text2);line-height:1.7;border-top:1px solid var(--border);background:var(--bg)}

/* ── LEAFLET ─────────────────────────────────────────────────────── */
.leaflet-container{background:#eee9df}
.leaflet-control-attribution{font-size:9px!important}
.loc-marker{width:22px;height:22px;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;box-shadow:0 1px 4px rgba(0,0,0,.3);line-height:1}

/* ── CONTENT SHARED ─────────────────────────────────────────────── */
.dc-eyebrow{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.c-hzh-t{color:var(--hzh)}.c-sha-t{color:var(--sha)}.c-njg-t{color:var(--njg)}.c-dep-t{color:var(--dep)}
.dc-heading{font-family:'Playfair Display',serif;font-size:25px;font-weight:400;line-height:1.2;margin-bottom:4px}
.dc-date{font-size:12px;color:var(--text3);margin-bottom:6px}
.dc-summary{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.65;padding-bottom:16px;border-bottom:1px solid var(--border)}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:100px;flex:1}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.stat-val{font-size:13px;font-weight:500}
.section-heading{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin:22px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-26px;top:2px;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-dot.transport{border-color:var(--hzh);background:var(--hzh-bg);color:var(--hzh)}
.tl-dot.food{border-color:#c47a00;background:#fff8e6;color:#c47a00}
.tl-dot.history{border-color:#a33;background:#fdf0f0;color:#a33}
.tl-dot.night{border-color:var(--sha);background:var(--sha-bg);color:var(--sha)}
.tl-dot.alert{border-color:#8a5a00;background:var(--njg-bg);color:#8a5a00}
.tl-dot.rest{border-color:#aaa;background:#f5f5f5;color:#aaa}
.tl-num{position:absolute;left:-26px;top:2px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white}
.tl-num.hzh{background:var(--hzh)}.tl-num.sha{background:var(--sha)}.tl-num.njg{background:var(--njg)}.tl-num.dep{background:var(--dep)}
.tl-time{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.tl-title{font-size:13px;font-weight:500;margin-bottom:3px}
.tl-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:5px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 7px;border-radius:99px;border:1px solid var(--border);color:var(--text3);background:var(--white)}
.tag.food{border-color:#e8c87a;background:#fffbf0;color:#8a5a00}
.tag.transport{border-color:#b5d0ee;background:var(--hzh-light);color:var(--hzh)}
.tag.warn{border-color:#f5c6c6;background:#fdf5f5;color:#a33}
.tag.night{border-color:#b5ddc8;background:var(--sha-light);color:var(--sha)}
.flight-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:16px}
.fc-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:9px}
.fc-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.fc-iata{font-family:'Playfair Display',serif;font-size:21px;font-weight:400}
.fc-city{font-size:11px;color:var(--text3);margin-top:1px}
.fc-time{font-size:13px;font-weight:500;margin-top:2px}
.fc-terminal{font-size:10px;color:var(--text3)}
.fc-mid{text-align:center}
.fc-dur{font-size:10px;color:var(--text3);margin-bottom:4px}
.fc-line{display:flex;align-items:center;gap:3px}
.fc-dot{width:4px;height:4px;border-radius:50%;background:var(--border);flex-shrink:0}
.fc-dash{flex:1;height:1px;background:var(--border)}
.fc-right{text-align:right}
.fc-footer{margin-top:9px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.fc-intl{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:var(--hzh-bg);color:var(--hzh);font-weight:500;margin-left:5px}
.fc-dom{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:#f0f0f0;color:var(--text3);font-weight:500;margin-left:5px}
.overnight{border:1px solid #d4b0ff;border-radius:var(--radius);background:#f8f5ff;padding:11px 14px;margin-bottom:16px}
.overnight h4{font-size:13px;font-weight:500;color:var(--dep);margin-bottom:3px}
.overnight p{font-size:12px;color:#6644aa;line-height:1.6}

/* ── MOBILE STYLES ───────────────────────────────────────────────── */
@media(max-width:767px){
  body{overflow-y:auto;overflow-x:hidden}
  #mobile-nav{display:block}
  #mobile-map-wrap{display:block}
  #app{display:block;height:auto;overflow:visible}
  #sidebar{display:none}
  #main{display:block;overflow:visible}
  #map-panel{display:none}
  #content-panel{padding:16px 16px 40px;overflow:visible}
  #day-content{max-width:100%}
  .dc-heading{font-size:22px}
  .dc-summary{font-size:13px}
  .stat{min-width:0}
  .stat-val{font-size:12px}
  .flight-card{padding:11px 13px}
  .fc-iata{font-size:18px}
  .fc-city{font-size:10px}
  .tl-title{font-size:13px}
  .tl-desc{font-size:12px}
}

/* ── TABLET ──────────────────────────────────────────────────────── */
@media(min-width:768px) and (max-width:1023px){
  #sidebar{width:200px;min-width:200px}
  #map-panel{width:280px;min-width:280px}
  #content-panel{padding:24px 24px}
}
</style>
</head>
<body>

<!-- MOBILE ONLY: sticky header + day strip -->
<div id="mobile-nav">
  <div id="mobile-header">
    <span id="mobile-title">China · <em>May 2026</em></span>
    <span id="mobile-city-pill" class="mob-pill-hzh">Hangzhou</span>
  </div>
  <div id="mobile-day-strip"></div>
</div>

<!-- DESKTOP LAYOUT -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>China<br><em>May 2026</em></h1>
      <p>Sydney · Hangzhou · Shanghai · Nanjing</p>
    </div>
    <div id="day-list"></div>
  </div>
  <div id="main">
    <div id="content-panel">

      <!-- MOBILE ONLY: inline collapsible map -->
      <div id="mobile-map-wrap">
        <button id="map-toggle-btn" onclick="toggleMobileMap()">
          <span id="map-toggle-label">🗺 Route map</span>
          <span id="map-toggle-arrow">▼</span>
        </button>
        <div id="mobile-map-inner">
          <div id="mobile-map-container"></div>
          <div id="mobile-map-legend"></div>
        </div>
      </div>

      <div id="day-content"></div>
    </div>
    <div id="map-panel">
      <div id="map-header">
        <span id="map-title">Route map</span>
        <span id="map-type"></span>
      </div>
      <div id="map-container"></div>
      <div id="map-legend"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

// ── STATE ──────────────────────────────────────────────────────────────
let cur=0, mapOpen=true;
let DMAP=null, MMAP=null; // desktop map, mobile map

const isMobile=()=>window.innerWidth<768;

// ── MAP ────────────────────────────────────────────────────────────────
function drawMap(container, day, existingMap) {
  if(existingMap){existingMap.remove();}
  const col=COL[day.city], locs=day.locs||[];
  if(!locs.length) return null;
  const m=L.map(container,{zoomControl:true,scrollWheelZoom:!isMobile()});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
    subdomains:'abcd',maxZoom:18
  }).addTo(m);
  const pts=locs.map(l=>[l.lat,l.lng]);
  if(day.mapType==='flight'){
    for(let i=0;i<pts.length-1;i++){
      const a=pts[i],b=pts[i+1],arc=[];
      for(let s=0;s<=24;s++){const t=s/24;arc.push([a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t+Math.sin(Math.PI*t)*2]);}
      L.polyline(arc,{color:col,weight:2,opacity:.65,dashArray:'7 5'}).addTo(m);
    }
  } else if(day.mapType==='intercity'){
    L.polyline(pts,{color:col,weight:2.5,opacity:.7,dashArray:'9 5'}).addTo(m);
  } else {
    L.polyline(pts,{color:col,weight:3,opacity:.75}).addTo(m);
  }
  locs.forEach(loc=>{
    L.marker([loc.lat,loc.lng],{icon:L.divIcon({className:'',html:`<div class="loc-marker" style="background:${col}">${loc.num}</div>`,iconSize:[22,22],iconAnchor:[11,11]})})
      .bindPopup(`<b style="font-size:12px;font-family:'DM Sans',sans-serif">${loc.n}</b>`,{maxWidth:180})
      .addTo(m);
  });
  m.fitBounds(L.latLngBounds(pts),{padding:[24,24]});
  return m;
}

function buildMaps(day){
  const legendHtml=day.locs.map(l=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><div style="width:15px;height:15px;min-width:15px;border-radius:50%;background:${COL[day.city]};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff">${l.num}</div><span>${l.n}</span></div>`).join('');
  const typeLabel={city:'Walking route',intercity:'Train route',flight:'Flight path'};
  // Desktop map
  DMAP=drawMap(document.getElementById('map-container'),day,DMAP);
  document.getElementById('map-legend').innerHTML=legendHtml;
  document.getElementById('map-type').textContent=typeLabel[day.mapType]||'';
  // Mobile map
  MMAP=drawMap(document.getElementById('mobile-map-container'),day,MMAP);
  document.getElementById('mobile-map-legend').innerHTML=legendHtml;
  document.getElementById('map-toggle-label').textContent='🗺 '+day.title+' route';
}

// ── MAP TOGGLE (mobile) ───────────────────────────────────────────────
function toggleMobileMap(){
  mapOpen=!mapOpen;
  const inner=document.getElementById('mobile-map-inner');
  const arrow=document.getElementById('map-toggle-arrow');
  inner.style.height=mapOpen?(document.getElementById('mobile-map-container').offsetHeight+document.getElementById('mobile-map-legend').offsetHeight+10)+'px':'0px';
  arrow.textContent=mapOpen?'▼':'▶';
  if(mapOpen && MMAP){setTimeout(()=>MMAP.invalidateSize(),260);}
}

// ── SIDEBAR ────────────────────────────────────────────────────────────
function buildSidebar(){
  // Desktop
  document.getElementById('day-list').innerHTML=DAYS.map((d,i)=>
    `<div class="day-item ${i===cur?'active':''} c-${d.city}" onclick="go(${i})">
      <div class="day-accent"></div>
      <div class="day-inner">
        <div class="day-meta"><span class="day-num">${d.date}</span><span class="day-pill">${d.cityLabel}</span></div>
        <div class="day-title">${d.title}</div>
        <div class="day-sub">${d.sub}</div>
      </div>
    </div>`).join('');
  // Mobile strip
  const strip=document.getElementById('mobile-day-strip');
  strip.innerHTML=DAYS.map((d,i)=>{
    const parts=d.dateShort.split('\n');
    const isActive=i===cur;
    return`<button class="mob-day-btn ${isActive?ACTIVE_CLASS[d.city]:''}" onclick="go(${i})">
      <div class="md">${parts[0]}</div>
      <div class="mw">${parts[1]}</div>
      <div class="color-bar" style="background:${COL[d.city]};opacity:${isActive?1:0.3}"></div>
    </button>`;
  }).join('');
  // Scroll active day button into view
  const btns=strip.querySelectorAll('.mob-day-btn');
  if(btns[cur]){btns[cur].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
  // Mobile header pill
  const d=DAYS[cur];
  const pill=document.getElementById('mobile-city-pill');
  pill.textContent=d.cityLabel;
  pill.className='mob-pill-'+d.city;
}

// ── RENDER DAY ─────────────────────────────────────────────────────────
const CT={hzh:'c-hzh-t',sha:'c-sha-t',njg:'c-njg-t',dep:'c-dep-t'};

function rf(f){
  return`<div class="flight-card">
    <div class="fc-label">${f.label}<span class="${f.type==='intl'?'fc-intl':'fc-dom'}">${f.type==='intl'?'International':'Domestic'}</span></div>
    <div class="fc-row">
      <div><div class="fc-iata">${f.from}</div><div class="fc-city">${f.fromCity}</div><div class="fc-time">${f.dep}</div><div class="fc-terminal">${f.depT}</div></div>
      <div class="fc-mid"><div class="fc-dur">${f.dur}</div><div class="fc-line"><div class="fc-dot"></div><div class="fc-dash"></div><span style="font-size:13px;color:var(--text3)">✈</span><div class="fc-dash"></div><div class="fc-dot"></div></div><div style="font-size:9px;color:var(--text3);margin-top:3px">China Southern</div></div>
      <div class="fc-right"><div class="fc-iata">${f.to}</div><div class="fc-city">${f.toCity}</div><div class="fc-time">${f.arr}</div><div class="fc-terminal">${f.arrT}</div></div>
    </div>
    <div class="fc-footer">${f.note}</div>
  </div>`;
}

function ri(item,city){
  const icons={transport:'✈',food:'◉',history:'▲',night:'◐',alert:'!',rest:'○'};
  const tags=(item.tags||[]).map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('');
  const dot=item.num?`<div class="tl-num ${city}">${item.num}</div>`:`<div class="tl-dot ${item.type}">${icons[item.type]||'○'}</div>`;
  return`<div class="tl-item">${dot}
    <div class="tl-time">${item.time}</div>
    <div class="tl-title">${item.title}</div>
    <div class="tl-desc">${item.desc}</div>
    ${tags?`<div class="tags">${tags}</div>`:''}</div>`;
}

function renderDay(){
  const d=DAYS[cur];
  let h=`<div class="dc-eyebrow ${CT[d.city]}">${d.cityLabel} · ${d.phase}</div>
    <div class="dc-heading">${d.title}</div>
    <div class="dc-date">${d.date}</div>
    <div class="dc-summary">${d.summary}</div>
    <div class="stat-row">${d.stats.map(s=>`<div class="stat"><div class="stat-label">${s.l}</div><div class="stat-val">${s.v}</div></div>`).join('')}</div>`;
  if(d.flights?.length){h+=`<div class="section-heading">Flights</div>${d.flights.map(rf).join('')}`;}
  if(d.overnight){h+=`<div class="overnight"><h4>🌙 ${d.overnight.title}</h4><p>${d.overnight.desc}</p></div>`;}
  if(d.items?.length){h+=`<div class="section-heading">Schedule</div><div class="timeline">${d.items.map(i=>ri(i,d.city)).join('')}</div>`;}
  document.getElementById('day-content').innerHTML=h;

  // Scroll to top
  const cp=document.getElementById('content-panel');
  if(isMobile()){window.scrollTo({top:0,behavior:'smooth'});}
  else{cp.scrollTop=0;}

  buildMaps(d);

  // Reset mobile map height after render
  if(isMobile()){
    const inner=document.getElementById('mobile-map-inner');
    if(mapOpen){
      requestAnimationFrame(()=>{
        const mh=document.getElementById('mobile-map-container').offsetHeight;
        const lh=document.getElementById('mobile-map-legend').offsetHeight;
        inner.style.height=(mh+lh+10)+'px';
        if(MMAP) MMAP.invalidateSize();
      });
    } else {
      inner.style.height='0px';
    }
  }
}

function go(i){cur=i;buildSidebar();renderDay();}

// ── INIT ───────────────────────────────────────────────────────────────
// Set initial mobile map height to open
document.getElementById('mobile-map-inner').style.height='auto';
buildSidebar();
renderDay();
// After first render, set proper height
requestAnimationFrame(()=>{
  const inner=document.getElementById('mobile-map-inner');
  const mh=document.getElementById('mobile-map-container').offsetHeight;
  const lh=document.getElementById('mobile-map-legend').offsetHeight;
  inner.style.height=(mh+lh+10)+'px';
});
</script>
